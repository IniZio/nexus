name: Commit Policy

on:
  pull_request:
    branches: [main, develop]

jobs:
  semantic-commits:
    name: Semantic Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR commit messages
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            ci
            build
            perf
            revert
          requireScope: false
