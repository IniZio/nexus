name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Semantic release bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Compute only, do not create tag/release'
        required: false
        default: false
        type: boolean
  release:
    types: [created]

jobs:
  compute-next-version:
    name: Compute Next Semantic Version
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.semver.outputs.tag }}
      version: ${{ steps.semver.outputs.version }}
      release_type: ${{ steps.semver.outputs.release_type }}
      should_release: ${{ steps.semver.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve semantic bump
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          last_tag=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [[ -z "${last_tag}" ]]; then
            last_tag="v0.0.0"
          fi

          range="${last_tag}..HEAD"
          if [[ "${last_tag}" == "v0.0.0" ]]; then
            range="HEAD"
          fi

          release_type=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            release_type="${{ github.event.inputs.release_type }}"
          else
            messages=$(git log --format=%s ${range})
            if [[ -z "${messages}" ]]; then
              release_type=""
            elif echo "${messages}" | grep -Eq '^[^:!]+\(.*\)!:|^[^:!]+!:'; then
              release_type="major"
            elif echo "${messages}" | grep -Eq '^feat(\(|:)' ; then
              release_type="minor"
            elif echo "${messages}" | grep -Eq '^fix(\(|:)' ; then
              release_type="patch"
            else
              release_type=""
            fi
          fi

          if [[ -z "${release_type}" ]]; then
            echo "No semantic release type detected; skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${last_tag#v}"
          IFS='.' read -r major minor patch <<< "${base}"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          case "${release_type}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          version="${major}.${minor}.${patch}"
          tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release_type=${release_type}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Summary
        if: steps.semver.outputs.should_release == 'true'
        run: |
          echo "Next release: ${{ steps.semver.outputs.tag }} (${{ steps.semver.outputs.release_type }})"

  tag-release:
    name: Tag Semantic Release
    if: needs.compute-next-version.outputs.should_release == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true')
    needs: compute-next-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ needs.compute-next-version.outputs.tag }}
      version: ${{ needs.compute-next-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.compute-next-version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists"
            exit 0
          fi
          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"

  test:
    name: Run CI Tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true

  version:
    name: Compute Version
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            short_sha="${GITHUB_SHA::7}"
            echo "version=0.0.0-main.${GITHUB_RUN_NUMBER}+${short_sha}" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build for ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: nexus-linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
            artifact: nexus-linux-arm64
          - os: macos-latest
            target: darwin-amd64
            artifact: nexus-darwin-amd64
          - os: macos-latest
            target: darwin-arm64
            artifact: nexus-darwin-arm64
          - os: windows-latest
            target: windows-amd64
            artifact: nexus-windows-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == windows* ]]; then
            GOOS=windows GOARCH=amd64 go build -o dist/${{ matrix.artifact }}.exe ./cmd/nexus
          else
            GOOS=$(echo ${{ matrix.target }} | cut -d'-' -f1) \
            GOARCH=$(echo ${{ matrix.target }} | cut -d'-' -f2) \
            go build -o dist/${{ matrix.artifact }} ./cmd/nexus
          fi

      - name: Package binary
        shell: bash
        working-directory: packages/nexus
        run: |
          mkdir -p release
          version="${{ needs.version.outputs.version }}"
          archive="nexus-${version}-${{ matrix.target }}.tar.gz"
          if [[ "${{ matrix.target }}" == windows* ]]; then
            tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}.exe"
          else
            tar -C dist -czf "release/${archive}" "${{ matrix.artifact }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/nexus/release/*

  publish-main-artifacts:
    name: Publish Main Build Artifacts
    if: false
    needs: [compute-next-version]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload consolidated main artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nexus-main-build-${{ needs.version.outputs.version }}
          path: artifacts/*

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, version]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Nexus v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
