name: Build Swift Dev App Release

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: "Bundle identifier for this build"
        required: false
        default: "com.nexus.NexusApp.dev"
      release_tag:
        description: "Optional tag for release (e.g. swift-dev-v1.2.3)"
        required: false
  push:
    tags:
      - "swift-dev-v*"

jobs:
  build-and-release:
    name: Build and Release macOS Dev App
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      DERIVED_DATA_PATH: packages/nexus-swift/.build/xcbuild-release
      BUNDLE_ID_FROM_INPUT: ${{ github.event.inputs.bundle_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # We intentionally do not bundle nexus-daemon in this app build.
      # The app now prefers installer-managed daemon binaries on PATH and
      # supports local dev source-daemon overrides.

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          default_bundle_id="com.nexus.NexusApp.dev"
          bundle_id="${BUNDLE_ID_FROM_INPUT:-$default_bundle_id}"
          if [[ -n "${{ github.ref_name }}" && "${{ startsWith(github.ref, 'refs/tags/') }}" == "true" ]]; then
            release_tag="${{ github.ref_name }}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          else
            release_tag="swift-dev-${{ github.run_number }}"
          fi
          echo "bundle_id=$bundle_id" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Build macOS app (unsigned)
        shell: bash
        run: |
          xcodebuild \
            -project packages/nexus-swift/NexusApp.xcodeproj \
            -scheme NexusApp \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            NEXUS_APP_BUNDLE_ID="${{ steps.meta.outputs.bundle_id }}" \
            NEXUS_APP_TEST_BUNDLE_ID="${{ steps.meta.outputs.bundle_id }}.tests" \
            NEXUS_UI_TEST_BUNDLE_ID="${{ steps.meta.outputs.bundle_id }}.uitests" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package app artifact
        shell: bash
        run: |
          app_path="${DERIVED_DATA_PATH}/Build/Products/Release/NexusApp.app"
          if [[ ! -d "$app_path" ]]; then
            echo "App bundle not found at $app_path" >&2
            exit 1
          fi
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "artifacts/NexusApp-${{ steps.meta.outputs.release_tag }}.zip"

      # --------------------------------------------------------------------
      # Future: signed + notarized release (kept commented while credentials
      # and Apple enrollment are still being finalized).
      #
      # - name: Import Developer ID certificate
      #   shell: bash
      #   env:
      #     MACOS_CERT_P12_B64: ${{ secrets.MACOS_CERT_P12_B64 }}
      #     MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      #     MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
      #   run: |
      #     echo "$MACOS_CERT_P12_B64" | base64 --decode > cert.p12
      #     security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      #     security default-keychain -s build.keychain
      #     security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
      #     security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
      #
      # - name: Codesign app bundle
      #   shell: bash
      #   env:
      #     MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      #   run: |
      #     app_path="${DERIVED_DATA_PATH}/Build/Products/Release/NexusApp.app"
      #     codesign --deep --force --options runtime --sign "$MACOS_CODESIGN_IDENTITY" "$app_path"
      #
      # - name: Notarize app bundle
      #   shell: bash
      #   env:
      #     APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      #     APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      #     APPLE_NOTARY_API_KEY_P8_B64: ${{ secrets.APPLE_NOTARY_API_KEY_P8_B64 }}
      #   run: |
      #     echo "$APPLE_NOTARY_API_KEY_P8_B64" | base64 --decode > AuthKey.p8
      #     xcrun notarytool submit "artifacts/NexusApp-${{ steps.meta.outputs.release_tag }}.zip" \
      #       --key AuthKey.p8 \
      #       --key-id "$APPLE_NOTARY_KEY_ID" \
      #       --issuer "$APPLE_NOTARY_ISSUER_ID" \
      #       --wait
      # --------------------------------------------------------------------

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-swift-dev-app
          path: artifacts/*.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          name: Nexus Swift Dev ${{ steps.meta.outputs.release_tag }}
          files: artifacts/*.zip
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
