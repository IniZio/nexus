name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go-fix:
    name: Go Fix Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Verify go tool fix produces no diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git ls-files '*.go')
          if [ ${#go_files[@]} -eq 0 ]; then
            echo "No Go files found; skipping go fix check"
            exit 0
          fi

          tmp_diff="$(mktemp)"
          go tool fix -go=go1.24 -diff "${go_files[@]}" >"$tmp_diff"
          if [ -s "$tmp_diff" ]; then
            echo "go tool fix reported changes. Please run: go tool fix -go=go1.24 <files>"
            cat "$tmp_diff"
            exit 1
          fi

  coverage:
    name: Go Coverage (nexus)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run full Go test coverage
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          # cmd/nexus and cmd/nexus-firecracker-agent import old pkg/* paths
          # that were removed in the rewrite; exclude them until CLI is rewired
          go test ./internal/... ./cmd/nexusd/ \
            -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-go-coverage
          path: packages/nexus/coverage.out
          retention-days: 7

  ci:
    name: Core CI (linux)
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Task
        uses: arduino/setup-task@v2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  # macOS: GitHub-hosted arm64 runners cannot use Apple Hypervisor Framework inside the VM (HV_UNSUPPORTED);
  # see https://github.com/abiosoft/colima/issues/970 — use the hosted Intel image (nested virt) or slower QEMU/lima
  # workarounds on arm64. We use macos-15-intel (x86_64) for Lima + Firecracker strict E2E without self-hosted runners.
  integration-sandbox:
    name: Integration Tests (process/sandbox)
    runs-on: ubuntu-latest
    container:
      image: golang:1.24
      options: >-
        --cap-add SYS_ADMIN
        --cap-add NET_ADMIN
        --security-opt seccomp=unconfined
        --security-opt apparmor:unconfined

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build nexus daemon
        run: |
          git config --global --add safe.directory "$(pwd)"
          cd packages/nexus
          go build -o /usr/local/bin/nexus-daemon ./cmd/nexusd

      - name: Install bubblewrap (process sandbox dependency)
        run: apt-get update -q && apt-get install -y bubblewrap

      - name: Run sandbox integration tests
        run: |
          cd packages/nexus
          go test -tags integration -v -timeout 10m -run TestAllDrivers/process ./test/integration/...

  # Lima/macOS integration tests require macOS runners with nested virtualization.
  # Uncomment when macos-15-intel runners are available in this org.
  # integration-lima:
  #   name: Integration Tests (lima/macOS)
  #   runs-on: macos-15-intel
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-go@v5
  #       with:
  #         go-version-file: packages/nexus/go.mod
  #     - name: Run lima integration tests
  #       run: |
  #         cd packages/nexus
  #         go test -tags integration -v -timeout 30m -run 'TestAllDrivers/lima|TestPoolCoexistence/lima' ./test/integration/...
