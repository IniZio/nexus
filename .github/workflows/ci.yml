name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go-fix:
    name: Go Fix Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Verify go tool fix produces no diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git ls-files '*.go')
          if [ ${#go_files[@]} -eq 0 ]; then
            echo "No Go files found; skipping go fix check"
            exit 0
          fi

          tmp_diff="$(mktemp)"
          go tool fix -go=go1.24 -diff "${go_files[@]}" >"$tmp_diff"
          if [ -s "$tmp_diff" ]; then
            echo "go tool fix reported changes. Please run: go tool fix -go=go1.24 <files>"
            cat "$tmp_diff"
            exit 1
          fi

  coverage:
    name: Go Coverage (nexus)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run full Go test coverage
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          go test ./... -covermode=atomic -coverprofile=coverage.out
          go tool cover -func=coverage.out | tail -n 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-go-coverage
          path: packages/nexus/coverage.out
          retention-days: 7

  ci:
    name: Core CI (linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Task
        uses: arduino/setup-task@v2

      - name: Run CI pipeline
        run: task ci
        env:
          CI: true

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: |
            **/test-results/
            **/coverage/
          retention-days: 7

  opencode-nexus-plugin:
    name: OpenCode Nexus Plugin Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run opencode-nexus plugin tests
        working-directory: packages/opencode-nexus
        run: node --test test/*.test.js

  nexus-subcommand-e2e:
    name: Nexus Subcommand E2E (${{ matrix.os }} / ${{ matrix.suite }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        suite: [init-exec, doctor-backends]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run init/exec coverage suite
        if: matrix.suite == 'init-exec'
        working-directory: packages/nexus
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            go test ./cmd/nexus -count=1 -run 'TestRunInit|TestDarwinBootstrap|TestEnsurePersistentLimaInstance'
          else
            go test ./cmd/nexus -count=1 -run 'TestRunInit|TestRunExec'
          fi

      - name: Run doctor/backend coverage suite
        if: matrix.suite == 'doctor-backends'
        working-directory: packages/nexus
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            go test ./cmd/nexus -count=1 -run 'TestResolveCheckCommand|TestRunCheckCommandCapturesOutput|TestRunCheckCommandWithExecContextHostExportsUIDAndGID'
          else
            go test ./cmd/nexus -count=1 -run 'TestDoctor_|TestResolveCheckCommand|TestRunCheckCommandWithExecContextFirecracker|TestBootstrapFirecracker'
          fi

  pty-runtime-e2e:
    name: PTY Runtime E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run PTY remote routing verification suite
        working-directory: packages/nexus
        run: |
          set -euo pipefail
          go test ./pkg/server -count=1 -run 'TestPTYOpenUsesRemoteConnectorForFirecrackerAndLXC' -v

      - name: Run live PTY smoke against daemon
        working-directory: packages/nexus
        shell: bash
        run: |
          set -euo pipefail

          PORT=8094
          TOKEN=ci-token
          WS_DIR="$(mktemp -d)"
          RUNNER_OS_LOWER="$(printf '%s' "${RUNNER_OS}" | tr '[:upper:]' '[:lower:]')"
          DAEMON_LOG="/tmp/nexus-daemon-${RUNNER_OS_LOWER}.log"
          SMOKE_LOG="pty-remote-smoke-${RUNNER_OS_LOWER}.log"

          go run ./cmd/daemon --port "${PORT}" --workspace-dir "${WS_DIR}" --token "${TOKEN}" >"${DAEMON_LOG}" 2>&1 &
          DAEMON_PID=$!
          cleanup() {
            if kill -0 "${DAEMON_PID}" >/dev/null 2>&1; then
              kill "${DAEMON_PID}" >/dev/null 2>&1 || true
              wait "${DAEMON_PID}" 2>/dev/null || true
            fi
            rm -rf "${WS_DIR}"
          }
          trap cleanup EXIT

          for _ in $(seq 1 40); do
            if curl -fsS "http://127.0.0.1:${PORT}/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:${PORT}/healthz" >/dev/null

          BACKEND="local"
          if command -v limactl >/dev/null 2>&1; then
            if limactl list --json nexus-lxc 2>/dev/null | grep -qv '^\[\]$'; then
              BACKEND="lxc"
            elif limactl list --json nexus-firecracker 2>/dev/null | grep -qv '^\[\]$'; then
              BACKEND="lxc"
            fi
          fi
          echo "selected backend: ${BACKEND}"

          WORKSPACE_ID=$(PORT="${PORT}" TOKEN="${TOKEN}" BACKEND="${BACKEND}" node - <<'NODE'
          const port = process.env.PORT;
          const token = process.env.TOKEN;
          const backend = process.env.BACKEND;
          const ws = new WebSocket(`ws://127.0.0.1:${port}/?token=${encodeURIComponent(token)}`);
          const id = `create-${Date.now()}`;

          ws.onopen = () => {
            ws.send(JSON.stringify({
              jsonrpc: "2.0",
              id,
              method: "workspace.create",
              params: {
                spec: {
                  repo: "https://example.com/repo.git",
                  ref: "main",
                  workspaceName: `ci-pty-${Date.now()}`,
                  agentProfile: "codex",
                  policy: {},
                  backend,
                },
              },
            }));
          };

          ws.onmessage = (event) => {
            const msg = JSON.parse(String(event.data));
            if (msg.error) {
              console.error(`workspace.create error: ${JSON.stringify(msg.error)}`);
              process.exit(1);
              return;
            }
            const workspaceId = msg.result && msg.result.workspace && msg.result.workspace.id;
            if (!workspaceId) {
              console.error("workspace.create missing workspace id");
              process.exit(1);
              return;
            }
            console.log(workspaceId);
            process.exit(0);
          };

          ws.onerror = (err) => {
            console.error(`workspace.create websocket error: ${String(err)}`);
            process.exit(1);
          };
          NODE
          )

          NEXUS_DAEMON_WS="ws://127.0.0.1:${PORT}" \
          NEXUS_DAEMON_TOKEN="${TOKEN}" \
          NEXUS_PTY_SMOKE_LOG="${SMOKE_LOG}" \
          node scripts/pty-remote-smoke.js "${WORKSPACE_ID}"

      - name: Archive PTY runtime logs (if present)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pty-runtime-e2e-${{ matrix.os }}
          path: |
            packages/nexus/pty-remote-smoke-*.log
            /tmp/nexus-daemon-*.log
          if-no-files-found: ignore
          retention-days: 7

  pty-lxc-managed-e2e:
    name: PTY LXC Managed E2E (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Ensure Lima installed
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v limactl >/dev/null 2>&1; then
            brew install lima
          fi

      - name: Bootstrap Nexus-managed runtime instance
        working-directory: packages/nexus
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_ROOT="$(mktemp -d)"
          mkdir -p "${PROJECT_ROOT}"
          go run ./cmd/nexus init --project-root "${PROJECT_ROOT}" --force

      - name: Run daemon + LXC PTY smoke
        working-directory: packages/nexus
        shell: bash
        run: |
          set -euo pipefail

          PORT=8095
          TOKEN=ci-token
          WS_DIR="$(mktemp -d)"
          DAEMON_LOG="/tmp/nexus-daemon-lxc-managed.log"
          SMOKE_LOG="pty-remote-smoke-lxc-managed.log"

          go run ./cmd/daemon --port "${PORT}" --workspace-dir "${WS_DIR}" --token "${TOKEN}" >"${DAEMON_LOG}" 2>&1 &
          DAEMON_PID=$!
          cleanup() {
            if kill -0 "${DAEMON_PID}" >/dev/null 2>&1; then
              kill "${DAEMON_PID}" >/dev/null 2>&1 || true
              wait "${DAEMON_PID}" 2>/dev/null || true
            fi
            rm -rf "${WS_DIR}"
          }
          trap cleanup EXIT

          for _ in $(seq 1 50); do
            if curl -fsS "http://127.0.0.1:${PORT}/healthz" >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS "http://127.0.0.1:${PORT}/healthz" >/dev/null

          WORKSPACE_ID=$(PORT="${PORT}" TOKEN="${TOKEN}" node - <<'NODE'
          const port = process.env.PORT;
          const token = process.env.TOKEN;
          const ws = new WebSocket(`ws://127.0.0.1:${port}/?token=${encodeURIComponent(token)}`);
          const id = `create-${Date.now()}`;

          ws.onopen = () => {
            ws.send(JSON.stringify({
              jsonrpc: "2.0",
              id,
              method: "workspace.create",
              params: {
                spec: {
                  repo: "https://example.com/repo.git",
                  ref: "main",
                  workspaceName: `ci-lxc-${Date.now()}`,
                  agentProfile: "codex",
                  policy: {},
                  backend: "lxc",
                },
              },
            }));
          };

          ws.onmessage = (event) => {
            const msg = JSON.parse(String(event.data));
            if (msg.error) {
              console.error(`workspace.create error: ${JSON.stringify(msg.error)}`);
              process.exit(1);
              return;
            }
            const workspaceId = msg.result && msg.result.workspace && msg.result.workspace.id;
            if (!workspaceId) {
              console.error("workspace.create missing workspace id");
              process.exit(1);
              return;
            }
            console.log(workspaceId);
            process.exit(0);
          };

          ws.onerror = (err) => {
            console.error(`workspace.create websocket error: ${String(err)}`);
            process.exit(1);
          };
          NODE
          )

          NEXUS_DAEMON_WS="ws://127.0.0.1:${PORT}" \
          NEXUS_DAEMON_TOKEN="${TOKEN}" \
          NEXUS_PTY_SMOKE_LOG="${SMOKE_LOG}" \
          node scripts/pty-remote-smoke.js "${WORKSPACE_ID}"

      - name: Archive LXC managed logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pty-lxc-managed-e2e-macos
          path: |
            packages/nexus/pty-remote-smoke-lxc-managed.log
            /tmp/nexus-daemon-lxc-managed.log
          if-no-files-found: ignore
          retention-days: 7
