root = "."
testdata_dir = "testdata"
tmp_dir = ".air-tmp"

[build]
  args_bin = [
    "--port", "8080",
    "--workspace-dir", "/tmp/nexus-dev-workspace",
    "--token", "dev-token",
  ]
  bin = "./.air-tmp/nexus-daemon"
  cmd = "go build -o ./.air-tmp/nexus-daemon ./cmd/daemon/"
  delay = 500
  exclude_dir = [
    ".air-tmp",
    "testdata",
    "vendor",
    "pkg/server/portal/ui_dist",
  ]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlinks = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "toml"]
  include_file = []
  kill_delay = "2s"
  log = "air-build.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = true
  unique_id = ""

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
